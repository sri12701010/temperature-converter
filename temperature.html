<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Temperature Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
      color: #333;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #45a049;
    }
    .result {
      margin-top: 20px;
      font-weight: bold;
      color: #222;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🌡️ Temperature Converter</h2>
    <input type="number" id="tempInput" placeholder="Enter value">
    <select id="unit">
      <option value="C">Celsius (°C)</option>
      <option value="F">Fahrenheit (°F)</option>
      <option value="K">Kelvin (K)</option>
    </select>
    <button onclick="convertTemp()">Convert</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    function convertTemp() {
      let value = parseFloat(document.getElementById("tempInput").value);
      let unit = document.getElementById("unit").value;
      let result = "";

      if (isNaN(value)) {
        document.getElementById("result").innerHTML = "⚠️ Please enter a valid number!";
        return;
      }

      if (unit === "C") {
        let f = (value * 9/5) + 32;
        let k = value + 273.15;
        result = `${value}°C = ${f.toFixed(2)}°F = ${k.toFixed(2)}K`;
      } 
      else if (unit === "F") {
        let c = (value - 32) * 5/9;
        let k = c + 273.15;
        result = `${value}°F = ${c.toFixed(2)}°C = ${k.toFixed(2)}K`;
      } 
      else if (unit === "K") {
        let c = value - 273.15;
        let f = (c * 9/5) + 32;
        result = `${value}K = ${c.toFixed(2)}°C = ${f.toFixed(2)}°F`;
      }

      document.getElementById("result").innerHTML = result;
    }
  </script>
</body>
</html>
